<script>
    const inputDiv = document.getElementById('input-display');
    const resultDiv = document.getElementById('result-preview');
    let currentInput = "";

    // Sound Engine — unchanged
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playUniversalSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(850, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.stop(audioCtx.currentTime + 0.12);
    }

    function handleAppend(val) {
        playUniversalSound();
        const lastPart = currentInput.split(/[\+\-\*\/]/).pop();
        if (val === '.' && lastPart.includes('.')) return;
        currentInput += val;
        updateUI();
    }

    function handleAction(type) {
        playUniversalSound();
        if (type === 'AC') currentInput = "";
        else currentInput = currentInput.slice(0, -1);
        updateUI();
    }

    function handleFinalize() {
        playUniversalSound();
        if (resultDiv.innerText !== "Error" && currentInput !== "") {
            currentInput = resultDiv.innerText;
            inputDiv.innerText = "";
            updateUI();
        }
    }

    function updateUI() {
        if (currentInput === "") {
            inputDiv.innerText = "0";
            resultDiv.innerText = "0";
            return;
        }
        inputDiv.innerText = currentInput;
        try {
            let cleanInput = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
            let res = Function('"use strict";return (' + cleanInput + ')')();
            resultDiv.innerText = res !== undefined ? Number(res.toFixed(10)) : "0";
        } catch (e) {
            // Keep preview current while typing
        }
    }
</script>
